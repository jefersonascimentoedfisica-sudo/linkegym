name: Build & Deploy LinkeGym

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/jefersonascimentoedfisica-sudo/linkegym:latest
            ghcr.io/jefersonascimentoedfisica-sudo/linkegym:${{ github.sha }}

      - name: Trigger Dokploy redeploy
        continue-on-error: true
        run: |
          curl -s -X POST "http://31.97.28.78:3000/api/trpc/application.update" \
            -H "x-api-key: claude_codeYwEQfDFPMWVCZUtQcKhOQzxJRiCPkZARdCRiIOUWANWdvLuKnqwrEhYRKfdobrUQ" \
            -H "Content-Type: application/json" \
            -d '{"json":{"applicationId":"4CjGACpjgfBSw_rphiXOP","buildType":"docker","dockerImage":"ghcr.io/jefersonascimentoedfisica-sudo/linkegym:latest"}}'
          sleep 5
          curl -s -X POST "http://31.97.28.78:3000/api/trpc/application.redeploy" \
            -H "x-api-key: claude_codeYwEQfDFPMWVCZUtQcKhOQzxJRiCPkZARdCRiIOUWANWdvLuKnqwrEhYRKfdobrUQ" \
            -H "Content-Type: application/json" \
            -d '{"json":{"applicationId":"4CjGACpjgfBSw_rphiXOP"}}'
          echo "Deploy triggered!"
