name: Build & Deploy LinkeGym

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ci
          push: true
          tags: |
            ghcr.io/jefersonascimentoedfisica-sudo/linkegym:latest
            ghcr.io/jefersonascimentoedfisica-sudo/linkegym:${{ steps.tag.outputs.IMAGE_TAG }}

      - name: Make package public
        continue-on-error: true
        run: |
          curl -s -X PATCH "https://api.github.com/user/packages/container/linkegym" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"visibility":"public"}'

      - name: Update Dokploy build args with new image tag
        continue-on-error: true
        run: |
          curl -s -X POST "http://31.97.28.78:3000/api/trpc/application.update" \
            -H "x-api-key: claude_codeYwEQfDFPMWVCZUtQcKhOQzxJRiCPkZARdCRiIOUWANWdvLuKnqwrEhYRKfdobrUQ" \
            -H "Content-Type: application/json" \
            -d "{\"json\":{\"applicationId\":\"4CjGACpjgfBSw_rphiXOP\",\"buildArgs\":\"IMAGE_TAG=${{ steps.tag.outputs.IMAGE_TAG }}\"}}"
          echo "Dokploy build args updated: IMAGE_TAG=${{ steps.tag.outputs.IMAGE_TAG }}"

      - name: Trigger Dokploy full deploy
        continue-on-error: true
        run: |
          curl -s -X POST "http://31.97.28.78:3000/api/trpc/application.deploy" \
            -H "x-api-key: claude_codeYwEQfDFPMWVCZUtQcKhOQzxJRiCPkZARdCRiIOUWANWdvLuKnqwrEhYRKfdobrUQ" \
            -H "Content-Type: application/json" \
            -d '{"json":{"applicationId":"4CjGACpjgfBSw_rphiXOP"}}'
          echo "Dokploy full deploy triggered"
