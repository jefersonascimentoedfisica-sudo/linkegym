server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index 01_HOME_Principal.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript;
    gzip_min_length 1024;

    # Routes
    location / {
        try_files $uri $uri/ /01_HOME_Principal.html;
    }

    location /treino-avulso {
        try_files /02_TREINO_AVULSO_Fluxo.html =404;
    }

    location /perfil-personal {
        try_files /03_PERFIL_Personal_Trainer.html =404;
    }

    location /fluxo-solicitacao {
        try_files /04_FLUXO_Solicitacao_Completo.html =404;
    }

    location /notificacoes {
        try_files /05_NOTIFICACOES_WhatsApp_Email.html =404;
    }

    # Health check
    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|webp|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
